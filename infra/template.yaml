AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TrendLens MVP - S3 upload -> worker -> DynamoDB; API for presigned URLs + results

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12

Parameters:
  AppEnv:
    Type: String
    Default: prod

Resources:
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../api
      Handler: app.lambda_handler.lambda_handler
      Runtime: python3.12
      Environment:
        Variables:
          APP_ENV: aws
          S3_BUCKET: !Ref UploadsBucket
          DDB_TABLE: !Ref JobsTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  # NOTE: Worker needs heavy deps (torch + faiss). In practice, package as a container image.
  # This template defines a placeholder ZIP-based worker; you may switch to ImageUri/ECR.
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../api
      Handler: app.worker.lambda_handler.lambda_handler
      Runtime: python3.12
      Timeout: 120
      MemorySize: 2048
      Environment:
        Variables:
          APP_ENV: aws
          S3_BUCKET: !Ref UploadsBucket
          DDB_TABLE: !Ref JobsTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Events:
        S3Upload:
          Type: S3
          Properties:
            Bucket: !Ref UploadsBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  BucketName:
    Value: !Ref UploadsBucket
  JobsTableName:
    Value: !Ref JobsTable
